<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Android Monitor Console</title>
    <link rel="stylesheet" href="/static/css/style.css" />
    <link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <div class="monitor-console">
        <header class="dex-header">
            <div class="dex-lamp-group">
                <div class="lamp lamp-blue"></div>
                <div class="lamp lamp-red"></div>
                <div class="lamp lamp-yellow"></div>
                <div class="lamp lamp-green"></div>
            </div>
            <div class="dex-title">Android Monitor Console</div>
        </header>

        <main class="dex-main">
            <!-- 좌측 상단: 메인 상태 화면 -->
            <section class="display-panel">
                <div class="screen-frame">
                    <div class="screen-inner">
                        <div class="status-visual">
                            <div id="state-icon" class="state-icon">◦</div>
                            <div id="state-label" class="state-label">SYSTEM IDLE</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 우측 카드 영역 -->
            <section class="right-column">
                <section class="card primary-card os-card">
                    <div class="card-label">시스템</div>
                    <div id="os-info" class="console-name"></div>
                </section>

                <section class="card primary-card state-card">
                    <div class="card-label">상태</div>
                    <div id="state" class="state-text"></div>
                </section>

                <section class="info-grid-mobile">
                    <div class="info-card">
                        <div class="card-label">네트워크</div>
                        <div id="network" class="info-value"></div>
                    </div>

                    <div class="info-card">
                        <div class="card-label">배터리</div>
                        <div id="battery" class="info-value"></div>
                    </div>

                    <div class="info-card">
                        <div class="card-label">충전</div>
                        <div id="charging" class="info-value"></div>
                    </div>

                    <div class="info-card">
                        <div class="card-label">사용시간</div>
                        <div id="idle-minutes" class="info-value"></div>
                    </div>
                </section>

                <section class="card primary-card environment-card">
                    <div class="card-label">환경</div>
                    <div id="weather" class="environment-line"></div>
                    <div id="air-quality" class="environment-line"></div>
                    <div id="environment-message" class="card-message"></div>
                </section>

                <section class="info-card location-card">
                    <div class="card-label">위치</div>
                    <div id="location" class="info-value"></div>
                </section>
            </section>

            <!-- 좌측 하단: 이벤트 로그 -->
            <section class="log-panel">
                <div class="log-header">EVENT LOG</div>
                <ul id="event-log"></ul>
            </section>
        </main>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
