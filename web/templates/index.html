<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeDesk</title>

    <!-- CSS 연결 -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="pokedex">

    <!-- 상단 헤더 -->
    <div class="dex-header">
        <div class="dex-lamp-group">
            <div class="lamp lamp-blue"></div>
            <div class="lamp lamp-red"></div>
            <div class="lamp lamp-yellow"></div>
            <div class="lamp lamp-green"></div>
        </div>
        <div class="dex-title">POKEDESK</div>
    </div>

    <!-- 상단 상태 패널 -->
    <div class="top-panel">
        <div class="top-left">
            <div class="screen-frame">
                <div class="screen-inner">
                    <img id="pokemon-img" src="" alt="pokemon">
                </div>
            </div>
        </div>

        <div class="top-right">
            <div class="pokemon-name-box">
                <span class="label">이름</span>
                <h2 id="pokemon-name"></h2>
            </div>

            <div class="message-box">
                <span class="label">메세지</span>
                <div id="message"></div>
            </div>
        </div>
    </div>

    <!-- 중간 정보 패널 -->
    <div class="middle-panel">
        <div class="info-grid">
            <div class="info-box">
                <span class="label">상태</span>
                <div id="state"></div>
            </div>

            <div class="info-box">
                <span class="label">시간</span>
                <div id="time"></div>
            </div>

            <div class="info-box">
                <span class="label">배터리</span>
                <div id="battery"></div>
            </div>

            <div class="info-box">
                <span class="label">충전</span>
                <div id="charging"></div>
            </div>

            <div class="info-box">
                <span class="label">위치</span>
                <div id="location"></div>
            </div>

            <div class="info-box">
                <span class="label">날씨</span>
                <div id="weather"></div>
            </div>

            <div class="info-box">
                <span class="label">공기</span>
                <div id="air-quality"></div>
            </div>

            <div class="info-box">
                <span class="label">사용시간</span>
                <div id="idle-minutes"></div>
            </div>
        </div>
    </div>

    <!-- 하단 로그 패널 -->
    <div class="bottom-panel">
        <div class="log-header">EVENT LOG</div>
        <ul id="event-log"></ul>
    </div>

</div>

<!-- JS 연결 -->
<script src="/static/js/app.js"></script>

</body>
</html>
