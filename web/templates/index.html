<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PokeDesk</title>

    <!-- CSS 연결 -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="card">

    <!-- 포켓몬 이미지 -->
    <img id="pokemon-img" src="" alt="pokemon">

    <!-- 포켓몬 이름 -->
    <h2 id="pokemon-name"></h2>

    <!-- 상태 -->
    <div id="state"></div>

    <!-- 말풍선 -->
    <div id="message"></div>

    <!-- 시간 -->
    <div id="time"></div>

    <!-- 배터리 -->
    <div id="battery"></div>

    <!-- 충전 상태 -->
    <div id="charging"></div>

    <!-- 유휴 시간 -->
    <div id="idle-minutes"></div>

    <!-- 이벤트 로그 제목 -->
    <h3 class="log-title">EVENT LOG</h3>

    <!-- 이벤트 로그 리스트 -->
    <ul id="event-log"></ul>

</div>

<!-- JS 연결 -->
<script src="/static/js/app.js"></script>

</body>
</html>
